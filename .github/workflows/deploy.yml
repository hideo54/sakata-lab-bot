name: Deploy to Cloud Run functions

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: cloud-run-functions-deployment
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: functions/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Google Cloud OIDC for sakataLabBot
        uses: google-github-actions/auth@v3
        with:
          project_id: hideo54
          workload_identity_provider: projects/662358710068/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: gh-deploy-sakata-lab-bot@hideo54.iam.gserviceaccount.com
          token_format: 'id_token'
          id_token_audience: 'https://asia-northeast1-hideo54.cloudfunctions.net/sakataLabBot'
      - name: Google Cloud OIDC for sakataLabBotScheduler
        uses: google-github-actions/auth@v3
        with:
          project_id: hideo54
          workload_identity_provider: projects/662358710068/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: gh-deploy-sakata-lab-bot@hideo54.iam.gserviceaccount.com
          token_format: 'id_token'
          id_token_audience: 'https://asia-northeast1-hideo54.cloudfunctions.net/sakataLabBotScheduler'
      - name: Deploy functions
        run: pnpm --prefix functions exec firebase deploy --only functions --project hideo54
        working-directory: .
